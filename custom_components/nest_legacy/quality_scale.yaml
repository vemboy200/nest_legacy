rules:
  # Bronze
  action-setup: done
  appropriate-polling: done
  brands:
    status: exempt
    comment: >
      Custom (non-core) HACS integration; brand assets are served through
      HACS rather than the home-assistant/brands repository used by core
      integrations.
  common-modules: done
  config-flow: done
  config-flow-test-coverage: done
  dependency-transparency: done
  docs-actions: done
  docs-high-level-description: done
  docs-installation-instructions: done
  docs-removal-instructions:
    status: exempt
    comment: Standard HA config entry removal via the UI; nothing custom to document.
  entity-event-setup: done
  entity-unique-id: done
  has-entity-name: done
  runtime-data: done
  test-before-configure: done
  test-before-setup: done
  unique-config-entry: done

  # Silver
  action-exceptions: done
  config-entry-unloading: done
  docs-configuration-parameters: done
  docs-installation-parameters: done
  entity-unavailable: done
  integration-owner: done
  log-when-unavailable: done
  parallel-updates: done
  reauthentication-flow: done
  test-coverage: done

  # Gold
  devices: done
  diagnostics: done
  discovery: done
  discovery-update-info:
    status: exempt
    comment: >
      DHCP discovery only triggers the existing account-based setup flow; it
      carries no per-device info (other than presence) to merge into an
      already-configured entry.
  docs-data-update: done
  docs-examples: done
  docs-known-limitations: done
  docs-supported-devices: done
  docs-supported-functions: done
  docs-troubleshooting: done
  docs-use-cases: done
  dynamic-devices: done
  entity-category: done
  entity-device-class: done
  entity-disabled-by-default: done
  entity-translations: done
  exception-translations: done
  icon-translations: done
  reconfiguration-flow: done
  repair-issues:
    status: exempt
    comment: No actionable repair scenarios currently identified for this integration.
  stale-devices: done

  # Platinum
  async-dependency:
    status: todo
    comment: >
      protobuf and bidict, used by the bundled pynest client, are
      synchronous; the client itself wraps aiohttp but pulls in sync
      dependencies for parsing.
  inject-websession: done
  strict-typing:
    status: todo
    comment: No mypy strict configuration or py.typed marker present.
