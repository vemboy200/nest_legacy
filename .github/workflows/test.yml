name: Test

on:
  push:
  pull_request:

jobs:
  pytest:
    name: Run test suite
    runs-on: ubuntu-latest
    steps:
      - name: "⬇️ Checkout the repository"
        uses: actions/checkout@v6

      - name: "🐍 Set up Python"
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: "📦 Install dependencies"
        run: |
          pip install -r requirements_test.txt
          pip install -r <(python3 -c "import json; print('\n'.join(json.load(open('custom_components/nest_legacy/manifest.json'))['requirements']))")

      - name: "✅ Run pytest"
        run: pytest tests/ -q
